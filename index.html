<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muonium Chess Replay (WASM)</title>
    <script type="module" src="/web/src/main.js"></script>
  </head>
  <body>
    <main id="app">
      <h1>Muonium Stack Chess Replay</h1>
      <section id="status"></section>
      <section id="replayLayout">
        <section id="boardPane">
          <div class="playerRow playerBlack">
            <div class="playerName" id="blackName">Black</div>
            <div class="captures" id="blackCaptures"></div>
          </div>
          <section id="board"></section>
          <div class="playerRow playerWhite">
            <div class="playerName" id="whiteName">White</div>
            <div class="captures" id="whiteCaptures"></div>
          </div>
          <div id="resultBanner"></div>
        </section>
        <section id="pgnPane">
          <h2>PGN Moves</h2>
          <div id="pgnViewer"></div>
          <div id="transportControls" aria-label="Replay controls">
            <button id="navStart" title="Start">⏮</button>
            <button id="navPrev" title="Previous">⏪</button>
            <button id="navPlay" title="Play/Pause">▶</button>
            <button id="navNext" title="Next">⏩</button>
            <button id="navEnd" title="End">⏭</button>
          </div>
        </section>
      </section>
      <section class="toolbar">
        <label for="gameSelect">Game</label>
        <select id="gameSelect"></select>
        <label class="inlineToggle" for="moveArrowToggle">
          <input id="moveArrowToggle" type="checkbox" checked />
          Move arrow
        </label>
        <button id="randomBtn">Random Autoplay</button>
        <button id="benchmarkFastBtn">Run Benchmark</button>
        <button id="benchmarkBtn">Run Visual Benchmark</button>
      </section>
      <section id="loadProgressWrap">
        <span>Load Progress</span>
        <span id="loadProgressText">Loaded 0 / 0 games</span>
      </section>
      <section id="benchmarkPanel">
        <div class="benchmarkHeader">
          <strong>Benchmark</strong>
          <span id="benchmarkModeLabel">Mode: Idle</span>
        </div>
        <div class="benchmarkRow" id="benchmarkRowRegular">
          <span class="benchmarkKind">Regular</span>
          <span id="benchmarkRegularGames">Games: 0 / 0</span>
          <span id="benchmarkRegularMoves">Moves: 0 / 0</span>
          <span id="benchmarkRegularMps">Moves/s: 0.0</span>
          <span id="benchmarkRegularEta">ETA: --</span>
          <span id="benchmarkRegularState">Idle</span>
        </div>
        <div class="benchmarkRow" id="benchmarkRowVisual">
          <span class="benchmarkKind">Visual</span>
          <span id="benchmarkVisualGames">Games: 0 / 0</span>
          <span id="benchmarkVisualMoves">Moves: 0 / 0</span>
          <span id="benchmarkVisualMps">Moves/s: 0.0</span>
          <span id="benchmarkVisualEta">ETA: --</span>
          <span id="benchmarkVisualArrowLatency">Arrow latency: --</span>
          <span id="benchmarkVisualState">Idle</span>
        </div>
        <div class="benchmarkActions">
        <button id="benchmarkPauseBtn" disabled>Pause</button>
        <button id="benchmarkStopBtn" disabled>Stop</button>
        </div>
      </section>
    </main>
  </body>
</html>
